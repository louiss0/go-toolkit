# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2
project_name: go-toolkit

builds:
  - id: go-toolkit
    main: ./main.go
    binary: gtk
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X {{ .ModulePath }}/build_info.rawCLI_VERSION={{ .Version }}
      - -X {{ .ModulePath }}/build_info.rawBUILD_DATE={{ .Date }}
      - -X github.com/louiss0/g-tools/mode.buildMode=production

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: louiss0
    name: go-toolkit

winget:
  - name: go-toolkit
    publisher: Shelton Louis
    short_description: "CLI for Go scaffolding and module maintenance."
    description: "Scaffold Go projects, add or remove module dependencies, manage providers, and reuse package presets from the command line."
    homepage: "https://github.com/louiss0/go-toolkit"
    license: MIT
    license_url: "https://github.com/louiss0/go-toolkit/blob/main/LICENSE"
    copyright: "Copyright (c) 2025 Shelton Louis"
    publisher_url: "https://github.com/louiss0"
    publisher_support_url: "https://github.com/louiss0/go-toolkit/issues/new"
    package_identifier: the-code-fixer-23.GoToolkit
    package_name: "go-toolkit"
    path: manifests/s/the-code-fixer-23/go-toolkit/{{ .Version }}
    commit_msg_template: "{{ .PackageIdentifier }}: {{ .Tag }}"
    release_notes: "{{.Changelog}}"
    release_notes_url: "https://github.com/louiss0/go-toolkit/releases/tag/{{ .Tag }}"
    installation_notes: "Installs the `gtk` executable."
    tags:
      - go
      - golang
      - cli
      - scaffolding
      - modules
    repository:
      owner: louiss0
      name: winget-pkgs
      branch: main
      git:
        url: "git@github.com:louiss0/winget-pkgs.git"
        private_key: "{{ .Env.GORELEASER_WINGET_DEPLOY_KEY_PATH }}"

homebrew_casks:
  - name: go-toolkit
    binaries:
      - gtk
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/louiss0/go-toolkit"
    description: "CLI for Go scaffolding and dependency workflows."
    repository:
      owner: louiss0
      name: homebrew-the-code-fixer-23
      branch: main
      git:
        url: "git@github.com:louiss0/homebrew-the-code-fixer-23.git"
        private_key: "{{ .Env.GORELEASER_HOMEBREW_DEPLOY_KEY_PATH }}"

nix:
  - name: go-toolkit
    commit_msg_template: "{{ .ProjectName }}: {{ .Tag }}"
    path: "pkgs/{{ .ProjectName }}/default.nix"
    homepage: "https://github.com/louiss0/go-toolkit"
    description: "CLI for scaffolding Go projects and managing module dependencies."
    license: mit
    repository:
      owner: louiss0
      name: the-code-fixer-23-nur
      branch: main
      git:
        url: "git@github.com:louiss0/the-code-fixer-23-nur.git"
        private_key: "{{ .Env.GORELEASER_NIX_DEPLOY_KEY_PATH }}"
