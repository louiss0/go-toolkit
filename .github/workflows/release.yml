name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          install_url: https://releases.nixos.org/nix/nix-2.18.1/install
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify Nix installation
        run: |
          nix --version
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "NIX_PATH=$NIX_PATH" >> "$GITHUB_ENV"
          if [ -n "${NIX_PROFILES:-}" ]; then
            echo "NIX_PROFILES=$NIX_PROFILES" >> "$GITHUB_ENV"
          fi
          if [ -n "${NIX_SSL_CERT_FILE:-}" ]; then
            echo "NIX_SSL_CERT_FILE=$NIX_SSL_CERT_FILE" >> "$GITHUB_ENV"
          fi

      - name: Ensure nix-prefetch-url is available
        run: |
          export PATH="$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          which nix
          which nix-prefetch-url || true

      - name: Normalize GoReleaser deploy key
        env:
          GORELEASER_DEPLOY_KEY_RAW: ${{ secrets.GORELEASER_DEPLOY_KEY }}
        run: |
          python3 - <<'PY'
          import os
          import textwrap

          raw_key = os.environ["GORELEASER_DEPLOY_KEY_RAW"].strip()
          body = raw_key.replace("-----BEGIN PRIVATE KEY-----", "")
          body = body.replace("-----END PRIVATE KEY-----", "")
          body = "".join(body.split())

          formatted_key = "\n".join([
              "-----BEGIN PRIVATE KEY-----",
              *textwrap.wrap(body, 64),
              "-----END PRIVATE KEY-----",
          ])

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write("GORELEASER_DEPLOY_KEY<<EOF\n")
              env_file.write(formatted_key)
              env_file.write("\nEOF\n")
          PY

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_DEPLOY_KEY: ${{ secrets.GORELEASER_DEPLOY_KEY }}
