name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          install_url: https://releases.nixos.org/nix/nix-2.18.1/install
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify Nix installation
        run: |
          nix --version
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "NIX_PATH=$NIX_PATH" >> "$GITHUB_ENV"
          if [ -n "${NIX_PROFILES:-}" ]; then
            echo "NIX_PROFILES=$NIX_PROFILES" >> "$GITHUB_ENV"
          fi
          if [ -n "${NIX_SSL_CERT_FILE:-}" ]; then
            echo "NIX_SSL_CERT_FILE=$NIX_SSL_CERT_FILE" >> "$GITHUB_ENV"
          fi

      - name: Ensure nix-prefetch-url is available
        run: |
          export PATH="$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          which nix
          which nix-prefetch-url || true

      - name: Write GoReleaser deploy keys
        env:
          GORELEASER_DEPLOY_KEY: ${{ secrets.GORELEASER_DEPLOY_KEY }}
          GORELEASER_HOMEBREW_DEPLOY_KEY: ${{ secrets.GORELEASER_HOMEBREW_DEPLOY_KEY }}
          GORELEASER_NIX_DEPLOY_KEY: ${{ secrets.GORELEASER_NIX_DEPLOY_KEY }}
        run: |
          write_key() {
            key_path="$1"
            key_value="$2"

            umask 077
            printf '%s\n' "$key_value" | tr -d '\r' > "$key_path"
            chmod 600 "$key_path"
          }

          winget_key_path="$RUNNER_TEMP/goreleaser-winget"
          homebrew_key_path="$RUNNER_TEMP/goreleaser-homebrew"
          nix_key_path="$RUNNER_TEMP/goreleaser-nix"

          write_key "$winget_key_path" "$GORELEASER_DEPLOY_KEY"
          write_key "$homebrew_key_path" "$GORELEASER_HOMEBREW_DEPLOY_KEY"
          write_key "$nix_key_path" "$GORELEASER_NIX_DEPLOY_KEY"

          {
            echo "GORELEASER_WINGET_DEPLOY_KEY_PATH=$winget_key_path"
            echo "GORELEASER_HOMEBREW_DEPLOY_KEY_PATH=$homebrew_key_path"
            echo "GORELEASER_NIX_DEPLOY_KEY_PATH=$nix_key_path"
          } >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
