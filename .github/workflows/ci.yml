name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint, format, and vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          set -euo pipefail
          files=$(gofmt -s -l . | grep -Ev '^(vendor/|$)' || true)
          if [[ -n "${files}" ]]; then
            echo "These files are not gofmt-formatted:"
            echo "${files}"
            echo "Run: gofmt -s -w ."
            exit 1
          fi

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Verify goimports
        run: |
          set -euo pipefail
          files=$(goimports -l . | grep -Ev '^(vendor/|$)' || true)
          if [[ -n "${files}" ]]; then
            echo "These files need goimports:"
            echo "${files}"
            echo "Run: goimports -w ."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Check go.mod is tidy
        run: |
          set -euo pipefail
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak
          go mod tidy
          if ! diff -u go.mod.bak go.mod >/dev/null || ! diff -u go.sum.bak go.sum >/dev/null; then
            echo "go.mod/go.sum changed after 'go mod tidy'. Please run it locally and commit."
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m --output.text.colors=true --output.text.print-linter-name=true

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Cross-compile smoke builds
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: true
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          DATE_RFC3339=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-X github.com/louiss0/go-toolkit/build_info.rawCLI_VERSION=dev -X github.com/louiss0/go-toolkit/build_info.rawBUILD_DATE=${DATE_RFC3339} -X github.com/louiss0/g-tools/mode.buildMode=production -s -w"
          mkdir -p dist
          out="dist/go-toolkit-${GOOS}-${GOARCH}"
          if [[ "${GOOS}" == "windows" ]]; then out="${out}.exe"; fi
          go build -trimpath -ldflags "${LDFLAGS}" -o "${out}" ./main.go
